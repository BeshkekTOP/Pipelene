name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pylint black isort
        
    - name: Lint with Flake8
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
      continue-on-error: true
      
    - name: Lint with Pylint
      run: pylint $(git ls-files '*.py') --exit-zero || true
      continue-on-error: true
      
    - name: Check with Black
      run: black --check . || true
      continue-on-error: true
      
    - name: Check with isort
      run: isort --check-only . || true
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run migrations
      run: python manage.py migrate --check --noinput
      
    - name: Collect static
      run: python manage.py collectstatic --noinput
      
    - name: Check configuration
      run: python manage.py check --deploy

    test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage
        
    - name: Clean old database files
      run: |
        rm -f db.sqlite3 test.db *.sqlite3
        
    - name: Run migrations (with fake-initial)
      env:
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: True
      run: |
        python manage.py migrate --fake-initial --noinput || true
      continue-on-error: true
      
    - name: Run tests with coverage
      env:
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: True
      run: |
        coverage run --source='.' manage.py test --keepdb=False --noinput || true
        coverage xml || true
        coverage html || true
      continue-on-error: true
      
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: |
          coverage.xml
          htmlcov/
        retention-days: 7

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install security tools
      run: |
        pip install bandit safety pip-audit
        
    - name: Run Bandit
      run: bandit -r . || true
      continue-on-error: true
      
    - name: Run Safety
      run: safety check || true
      continue-on-error: true
      
    - name: Run pip-audit
      run: pip-audit || true
      continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: docker build -t my-django-app:${{ github.sha }} .
      continue-on-error: true
      
    - name: Save Docker image
      run: |
        docker save my-django-app:${{ github.sha }} | gzip > docker-image.tar.gz
        
    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: docker-image.tar.gz
        retention-days: 1