name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ==================== ЛИНТЕРЫ ====================
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pylint black isort
        
    - name: Check imports with isort
      run: |
        isort --check-only --diff .
      continue-on-error: true
      
    - name: Lint with Flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
      
    - name: Lint with Pylint
      run: |
        pylint $(git ls-files '*.py') --exit-zero || true
      continue-on-error: true
      
    - name: Check code style with Black
      run: |
        black --check --diff .
      continue-on-error: true

  # ==================== СБОРКА ПРОЕКТА ====================
  build:
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run migrations
      env:
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: True
      run: |
        python manage.py migrate --check --noinput
        
    - name: Collect static files
      env:
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: True
      run: |
        python manage.py collectstatic --noinput
        
    - name: Check configuration
      env:
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: True
      run: |
        python manage.py check --deploy
        
    - name: Upload static files as artifact
      uses: actions/upload-artifact@v4
      with:
        name: static-files
        path: staticfiles/
        retention-days: 7

  # ==================== ТЕСТЫ ====================
  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage
        
    - name: Clean old database files
      run: |
        rm -f db.sqlite3 test.db *.sqlite3
        
    - name: Run migrations
      env:
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: True
      run: |
        python manage.py migrate --fake-initial --noinput || true
      continue-on-error: true
      
    - name: Run tests with coverage
      env:
        SECRET_KEY: test-secret-key-for-ci
        DEBUG: True
      run: |
        coverage run --source='.' manage.py test --keepdb=False --noinput || true
        coverage xml || true
        coverage html || true
      continue-on-error: true
      
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: |
          coverage.xml
          htmlcov/
        retention-days: 7
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          htmlcov/
        retention-days: 7

  # ==================== БЕЗОПАСНОСТЬ ====================
  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit
        
    - name: Run Bandit (code security)
      run: |
        bandit -r . -f json -o bandit-report.json || true
      continue-on-error: true
      
    - name: Run Safety (dependency check)
      run: |
        safety check --json > safety-report.json || true
      continue-on-error: true
      
    - name: Run pip-audit
      run: |
        pip-audit --desc -o pip-audit-report.json || true
      continue-on-error: true
      
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
          pip-audit-report.json
        retention-days: 7

  # ==================== DOCKER BUILD ====================
  docker-build:
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: |
        docker build -t my-django-app:${{ github.sha }} .
      continue-on-error: true
      
    - name: Save Docker image
      run: |
        docker save my-django-app:${{ github.sha }} | gzip > docker-image.tar.gz
        
    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: docker-image
        path: docker-image.tar.gz
        retention-days: 1